# Weekly Status Report Agent Configuration

# Scheduling Configuration
schedule:
  day: "Friday"  # Day of week to generate report
  time: "17:00"  # Time in 24-hour format
  timezone: "America/Los_Angeles"

# Gmail Configuration
gmail:
  # Labels to monitor (empty list means all emails)
  labels: ["Work", "Important"]
  
  # Exclude emails from these senders (supports wildcards)
  exclude_senders:
    - "noreply@"
    - "notifications@"
    - "do-not-reply@"
  
  # Number of days to look back
  lookback_days: 7
  
  # Include specific senders (optional, overrides general search)
  include_senders: []
  
  # Maximum emails to process
  max_emails: 100

# Jira Configuration
jira:
  # Jira instance URL (set in .env for security)
  # url: set via JIRA_URL environment variable

  # Projects to track (required for focused collection)
  projects: ["AIPCC"]

  # Components to filter (optional - empty list means all components)
  # Use exact component names from Jira
  components: ["Accelerator Enablement","Development Platform","Wheel Package Index"]
  
  # Include epic information
  include_epics: true
  
  # Track sprint progress (temporarily disabled - slow on large Jira instances)
  track_sprints: false

  # Optional: Jira Software board IDs to query for active sprints (recommended for performance)
  # Specifying board IDs:
  #   - Avoids scanning all visible boards
  #   - Board names are cached to reduce API calls
  #   - Much faster for large Jira instances
  # board_ids: [42, 43]
  
  # Custom JQL filter (optional, applied in addition to projects)
  custom_jql: ""
  
  # Issue types to include
  issue_types: ["Feature", "Initiative", "Story", "Task", "Bug", "Epic"]
  
  # Include comments in analysis
  include_comments: true

  # Configurable data limits (helps manage token usage and response size)
  # Adjust these to balance detail vs. performance:
  #   - Increase for detailed analysis (more context for AI)
  #   - Decrease for high-volume tracking (faster collection, lower token usage)

  # Number of recent comments to fetch per issue (default: 5)
  max_comments_per_issue: 5

  # Character limit for each comment body (default: 500)
  max_comment_length: 500

  # Character limit for issue descriptions (default: 1000)
  max_description_length: 1000

  # Issues per Jira search request (1–100; Jira caps each page at 100)
  search_page_size: 100
  
  # Optional: stop after this many issues (omit or null for no limit)
  # max_issues: 500
  
  # Jira Cloud: batch-fetch status changelogs (fewer API calls). Falls back per issue on Server/DC or errors.
  bulk_changelog: true
  # Issues per bulk changelog request (max 1000)
  bulk_changelog_chunk_size: 1000

# GitLab Configuration
gitlab:
  # GitLab instance URL (set in .env for security, or override here)
  # url: set via GITLAB_URL environment variable (defaults to https://gitlab.com)
  # token: set via GITLAB_TOKEN environment variable

  # Projects to track (use project ID or namespace/project format)
  # Example: ["12345678"] or ["my-group/my-project"]
  projects: []

  # Project prefixes to track (includes all subprojects under these paths)
  # Example: ["redhat/rhel-ai/core"] will include all projects under that namespace
  # like "redhat/rhel-ai/core/tools/...", "redhat/rhel-ai/core/mirrors/...", etc.
  project_prefixes:
    - "redhat/rhel-ai/core"

  # MR states to include
  states:
    - "opened"  # Currently open MRs
    - "merged"  # MRs merged in period
    # - "closed"  # MRs closed without merging

  # Include draft/WIP merge requests
  include_drafts: false

  # Include pipeline status
  include_pipelines: true

  # Include approval details
  include_approvals: true

  # Number of days to look back
  lookback_days: 7

  # Maximum MRs per project
  max_mrs_per_project: 50

  # Configurable data limits
  max_comments_per_mr: 5
  max_comment_length: 500
  max_description_length: 1000

  # Filter by labels (optional, empty = all)
  labels: []

  # Filter by authors (optional, empty = all)
  authors: []

# Google Drive Configuration
gdrive:
  # Folders to monitor (get IDs from folder URLs)
  # To find folder ID: open folder in Drive, copy ID from URL
  # Example URL: https://drive.google.com/drive/folders/1a2b3c4d5e6f7g8h9i0
  #              The ID is: 1a2b3c4d5e6f7g8h9i0
  folders: []
    # - id: "YOUR_FOLDER_ID_1"
    #   name: "Project Documents"
    # - id: "YOUR_FOLDER_ID_2"
    #   name: "Team Shared"
  
  # File types to include (empty means all)
  file_types:
    - "application/vnd.google-apps.document"
    - "application/vnd.google-apps.spreadsheet"
    - "application/vnd.google-apps.presentation"
    - "application/pdf"
  
  # Include files shared with you
  include_shared_with_me: true
  
  # Lookback days for file modifications
  lookback_days: 7

# AI Configuration
ai:
  # Provider: "vertex" (GCP Vertex AI), "anthropic" (direct), or "openai"
  provider: "vertex"

  # Model to use
  # For Vertex AI (us-east1): "claude-haiku-4-5", "claude-sonnet-4-5", or "claude-sonnet-4-6"
  # Haiku is faster and cheaper, good for testing
  # For Anthropic direct: "claude-3-5-sonnet-20241022"
  # For OpenAI: "gpt-4-turbo-preview"
  model: "claude-haiku-4-5"
  
  # Temperature (0.0-1.0, lower = more focused)
  temperature: 0.3
  
  # Max tokens for response
  max_tokens: 4000
  
  # Enable advanced analysis features
  enable_sentiment_analysis: false
  enable_trend_detection: false

# Report Output Configuration
output:
  # Google Drive folder ID for generated reports
  # Path: /Development/AIPCC-E/Status Updates
  drive_folder_id: "17VEALruwtiNnlGzF7ZzRe_tHqAV3pHj7"
  
  # Report title format (supports date placeholders)
  title_format: "Weekly Status Report - {start_date} to {end_date}"
  
  # Share report with these email addresses
  share_with:
    - "fjansen@redhat.com"

  # Include raw data appendix
  include_raw_data: false

  # Generate summary email
  send_email_notification: true
  notification_email: "fjansen@redhat.com"

# Database Configuration
database:
  # SQLite database path
  path: "data/tracking.db"
  
  # Retain processed items for N days (for deduplication)
  retention_days: 30

# Logging Configuration
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR
  # Use DEBUG to see:
  #   - Full configuration summary on startup
  #   - JQL query validation details
  #   - Performance metrics and caching info
  #   - Stack traces for all errors
  level: "INFO"
  
  # Log file path
  file: "logs/agent.log"
  
  # Max log file size (MB)
  max_size_mb: 10
  
  # Number of backup log files
  backup_count: 5
